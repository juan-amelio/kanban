<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233b82f6'/%3E%3Crect x='20' y='24' width='16' height='52' rx='4' fill='white'/%3E%3Crect x='42' y='24' width='16' height='34' rx='4' fill='white'/%3E%3Crect x='64' y='24' width='16' height='44' rx='4' fill='white'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban</title>
    <script>
      // Aplica el tema antes del primer render para evitar el "flash"
      (function () {
        try {
          var t = localStorage.getItem("kanban_theme");
          if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
